<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>瑞金医院功能神外宣讲AI</title>
    <link href="{% static 'promotions/css/bootstrap.min.css' %}" rel="stylesheet" />
    <script src="{% static 'promotions/js/jquery-3.5.1.min.js' %}"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>

    <style>
        html, body {
            height: 100%;
        }

        .app-header{background:#0d6efd;color:#fff;padding:10px;border-radius:.5rem;}
        .app-layout{display:flex;gap:1rem;align-items:stretch;position:relative;}
        .panel-left,.panel-center,.panel-right{display:flex;flex-direction:column;min-width:0;}
        .panel-left{flex:0 0 28%;}
        .panel-center{flex:1 1 auto;position:relative;transition:flex-basis .35s ease,max-width .35s ease;}
        .panel-right{flex:0 0 24%;transition:flex-basis .35s ease,max-width .35s ease,opacity .35s ease,transform .35s ease;}
        .sidebar-hidden .panel-right{max-width:0!important;flex-basis:0!important;opacity:0;overflow:hidden;transform:translateX(8px);pointer-events:none;}
        .video-card{position:sticky;top:1rem;}
        .unity-iframe { width: 100%; height: 65vh; border: 0; border-radius: .5rem; }
        .video-card video{width:100%;height:auto;border-radius:.5rem;}

        .chat-surface{background:#fff;border-radius:.5rem;box-shadow:0 0.125rem 0.25rem rgba(0,0,0,.075);display:flex;flex-direction:column;min-height:60vh;}
        .chat-messages{padding:1rem;overflow-y:auto;flex:1 1 auto;scroll-behavior:smooth;border-bottom:1px solid rgba(0,0,0,.075);}
        .message{display:flex;margin-bottom:.5rem;}
        .message.user{justify-content:flex-end;}
        .message.ai{justify-content:flex-start;}
        .bubble{max-width:78%;padding:.5rem .75rem;border-radius:1rem;box-shadow:0 1px 2px rgba(0,0,0,.05);word-wrap:break-word;white-space:pre-wrap;line-height:1.45;font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;}
        .message.user .bubble{background:#dceeff;border-top-right-radius:.25rem;}
        .message.ai .bubble{background:#f8f9fa;border-top-left-radius:.25rem;}
        .bubble .thinking{color:#6c757d;margin-bottom:.25rem;font-size:.85rem;display:flex;align-items:center;gap:.25rem;opacity:0.85;}
        .bubble .answer{color:#212529;}
        .bubble .answer .markdown-body{line-height:1.5;}
        .bubble .answer .markdown-body p{margin:0 0 .35rem;}
        .bubble .answer .markdown-body p:last-child{margin-bottom:0;}
        .bubble .answer .markdown-body ul,
        .bubble .answer .markdown-body ol{padding-left:1.25rem;margin:.25rem 0 .4rem;}
        .bubble .answer .markdown-body li{margin-bottom:.1rem;}
        .bubble .answer .markdown-body h1,
        .bubble .answer .markdown-body h2,
        .bubble .answer .markdown-body h3,
        .bubble .answer .markdown-body h4{font-size:1rem;margin:.75rem 0 .5rem;}
        .bubble .answer .markdown-body a{color:#0d6efd;word-break:break-all;}
        .bubble .answer .markdown-body code{background:#eef2f7;padding:.1rem .3rem;border-radius:.25rem;font-size:.9em;}
        .bubble .answer .markdown-body pre{background:#111827;color:#f9fafb;padding:.75rem;border-radius:.5rem;overflow:auto;}
        .inline-media-card{margin-top:.85rem;padding:.75rem;border:1px solid rgba(13,110,253,.18);border-radius:.75rem;background:rgba(13,110,253,.04);}
        .inline-media-title{font-size:.9rem;font-weight:600;color:#0d6efd;margin-bottom:.5rem;}
        .inline-media-wrap video,
        .inline-media-wrap img,
        .inline-media-wrap iframe{width:100%;height:auto;border-radius:.5rem;display:block;border:0;background:#fff;}
        .inline-media-wrap iframe{min-height:420px;}
        .inline-media-link{display:inline-flex;align-items:center;gap:.35rem;margin-top:.5rem;color:#0d6efd;text-decoration:none;font-size:.92rem;}

        /* jumping dots */
        .dots { display:inline-block; }
        .dot { display:inline-block;width:.4em;height:.4em;border-radius:50%;background:#6c757d;margin-left:.18em;animation:bounce 1.2s infinite ease-in-out; }
        .dot:nth-child(2){ animation-delay:.2s; }
        .dot:nth-child(3){ animation-delay:.4s; }
        @keyframes bounce {
            0%,80%,100% { transform: translateY(0); opacity:.6; }
            40% { transform: translateY(-3px); opacity:1; }
        }

        .chat-input{padding:.75rem;display:flex;gap:.5rem;align-items:center;}
        .chat-input textarea{resize:vertical;min-height:90px;max-height:200px;}

        .sidebar{background:#fff;border-radius:.5rem;box-shadow:0 0.125rem 0.25rem rgba(0,0,0,.075);overflow:hidden;}
        .sidebar-header{padding:.75rem 1rem;border-bottom:1px solid rgba(0,0,0,.075);display:flex;align-items:center;justify-content:space-between;}
        .sidebar-body{padding:1rem;}

        .sidebar-toggle-tab{
            position:absolute;top:50%;right:-0.75rem;transform:translateY(-50%);
            z-index:20;border:1px solid rgba(0,0,0,.1);background:#fff;border-radius:1rem;
            width:36px;height:72px;display:flex;align-items:center;justify-content:center;
            box-shadow:0 6px 16px rgba(0,0,0,.12);cursor:pointer;user-select:none;
        }
        .sidebar-toggle-tab .icon{font-size:1.25rem;line-height:1;}
        .sidebar-toggle-tab:hover{box-shadow:0 8px 20px rgba(0,0,0,.16);}

        /* Video bubble styles */
        .video-bubble .video-wrapper { position: relative; }
        .video-bubble video { width: 100%; height: auto; border-radius: .5rem; display: block; }

        /* Overlay reply button (top-right over video) */
        .video-bubble .reply-btn {
          position: absolute; top: 8px; right: 8px; z-index: 2;
          padding: .25rem .5rem; border-radius: 9999px;
          background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,.15);
          font-size: .875rem; cursor: pointer;
          box-shadow: 0 2px 6px rgba(0,0,0,.15);
        }
        .video-bubble .reply-btn:hover { background: #fff; }

        /* Optional: full-screen overlay fallback if fullscreen API is blocked (mobile) */
        .intro-overlay {
          position: fixed; inset: 0; background: #000; display: none; align-items: center; justify-content: center;
          z-index: 9999;
        }
        .intro-overlay.active { display: flex; }
        .intro-overlay video { width: 100%; height: 100%; object-fit: contain; }
        .intro-gate {
          position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
          background: rgba(0,0,0,.6); z-index: 9999;
        }
        .intro-gate .gate-card {
          background: #fff; border-radius: .75rem; padding: 1.25rem 1.5rem;
          box-shadow: 0 10px 30px rgba(0,0,0,.25); text-align: center; max-width: 420px; width: 92%;
        }
        .gate-title { font-weight: 600; margin-bottom: .75rem; }

        @media (max-width: 991.98px){
            .app-layout{flex-direction:column;}
            .panel-left,.panel-center,.panel-right{flex-basis:auto!important;max-width:100%!important;}
            .video-card{position:static;}
            .sidebar-toggle-tab{position:fixed;right:1rem;bottom:1rem;top:auto;transform:none;height:44px;width:44px;border-radius:50%;}
        }

        /* MOBILE UNITY-BG START: phone-style layout */
        @media (max-width: 767.98px){
            html, body {
                height: 100%;
                overflow: hidden;
            }

            .root-container {
                height: 100%;
                max-width: 100%;
                margin: 0;
                padding: 0;
            }
            /* 让输入区在手机上变成上下布局，textarea 占大空间 */
            .chat-input {
                flex-direction: column;      /* 从横排改为竖排 */
                align-items: stretch;        /* 宽度拉满 */
                gap: .4rem;
            }

            .chat-input textarea {
                min-height: 80px;           /* 明确给一个多行高度 */
                max-height: 140px;          /* 防止太高挡住聊天记录 */
            }

            .chat-input button {
                width: 100%;                /* 提交按钮占满一行，方便点 */
            }
            
            /* Unity fills whole screen as background */
            .panel-left {
                position: fixed;
                inset: 0;
                z-index: 0;
            }
            .video-card {
                height: 100%;
                background: transparent;
                border: none;
                box-shadow: none;
            }
            .video-card .card-body {
                height: 100%;
                padding: 0;
            }
            .video-card .card-body > .mb-2,
            .video-card .card-body > .mt-2 {
                display: none; /* hide title & “新窗口打开” on mobile */
            }
            .unity-embed {
                height: 100%;
            }
            .unity-iframe {
                height: 100%;
                border-radius: 0;
            }

            /* Overlay the rest at bottom with transparent panel */
            .app-header {
                position: fixed;
                top: .75rem;
                left: .75rem;
                right: .75rem;
                z-index: 3;
                border-radius: .75rem;
                background: rgba(13,110,253,0.05);
            }

            .app-layout {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                top: auto;
                z-index: 2;
                padding: 0 .75rem .75rem;
                gap: .5rem;
                flex-direction: column;
                align-items: stretch;
                pointer-events: none; /* only children receive clicks */
            }

            /* translucent bottom panel background */
            .app-layout::before {
                content: '';
                position: absolute;
                inset: 0;
                background: rgba(255,255,255,0.05);
                backdrop-filter: blur(10px);
                border-radius: 1rem 1rem 0 0;
                z-index: -1;
            }

            .panel-center,
            .panel-right {
                pointer-events: auto;
            }

            .panel-center {
                max-height: 58vh;
                overflow: hidden;
            }

            .chat-surface {
                background: transparent;
                box-shadow: none;
                min-height: 0;
                max-height: 58vh;
                display: flex;
                flex-direction: column;
            }

            .chat-messages {
                max-height: 38vh;
                border-radius: .75rem;
                background: rgba(255,255,255,0.05);
                border: none;
            }

            .chat-input {
                padding: .5rem 0 0;
            }

            .sidebar {
                background: rgba(255,255,255,0.05);
                border-radius: .75rem;
            }

            .sidebar-toggle-tab {
                bottom: 4.5rem;
                right: .75rem;
            }
            .sidebar-collapse-toggle {
                color: inherit;
            }
            .sidebar-collapse-toggle:hover {
                text-decoration: none;
            }
        }
        /* Intro welcome text (below the intro video) */
        .video-bubble .intro-welcome {
          margin-top: .5rem;
          padding-top: .5rem;
          border-top: 1px solid rgba(0,0,0,0.08);
          font-size: .9rem;
          line-height: 1.4;
          color: #6c757d;
        }

        /* MOBILE UNITY-BG END */
    </style>
</head>

<div class="container my-4 root-container">
    <h1 class="text-center my-2 app-header">瑞金医院功能神外宣讲AI</h1>
    <div id="appLayout"
     class="app-layout mt-3"
     data-show-intro="{{ show_intro|yesno:'1,0' }}"
     data-intro-src="{% static 'promotions/hospital_notification.mp4' %}"
     data-intro-welcome="欢迎来到瑞金医院功能神外智能宣讲。请先观看入院介绍视频，如有问题可在右侧输入提问。">

        <!-- Left: Unity WebGL (replaces the video) -->
        <div class="panel-left">
          <div class="video-card card">
            <div class="card-body">
              <div class="mb-2 fw-bold">3D 场景</div>

              <!-- Responsive container (keeps aspect ratio if you prefer 16:9) -->
              <div class="unity-embed">
                {% now "U" as ts %}
                <iframe
                  id="unityFrame"
                  class="unity-iframe"
                  src="{% static 'promotions/unity/Build/index.html' %}?v={{ ts }}"

                  loading="lazy"
                  allow="fullscreen; xr-spatial-tracking; gamepad"

                ></iframe>
              </div>

              <div class="mt-2">
                <a class="btn btn-sm btn-outline-primary" target="_blank"
                   href="{% static 'promotions/unity/Build/index.html' %}">
                  新窗口打开 3D 场景
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- Center: Chat -->
        <form id="promotion-form" class="panel-center" method="post">
            {% csrf_token %}
            <div class="chat-surface">
                <div id="chat-messages" class="chat-messages">
                    {% for chat in chat_history %}
                        <div class="message user"><div class="bubble"><strong>问题：</strong> {{ chat.user }}</div></div>
                        <div class="message ai">

                    {% endfor %}
                </div>
                <div class="chat-input">
                    <textarea id="promotionText" name="promotion_text" class="form-control" placeholder="在此输入您的问题"></textarea>
                    <button type="submit" id="submit-button" class="btn btn-primary">提交问题</button>
                </div>
            </div>

            <!-- TTS (optional) -->
            <audio id="tts-audio" src="" autoplay hidden></audio>

            <!-- Hide/Show Sidebar Tab -->
            <button type="button" id="sidebarToggleTab" class="sidebar-toggle-tab" title="隐藏/显示模型选择">
                <span class="icon" aria-hidden="true">›</span>
            </button>

            <!-- Right: Sidebar -->
            <aside id="sidebar" class="panel-right">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <!-- clickable header to toggle collapse -->
                        <button
                            class="btn btn-link p-0 sidebar-collapse-toggle d-flex align-items-center justify-content-between w-100 text-decoration-none"
                            type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#modelCollapse"
                            aria-expanded="true"
                            aria-controls="modelCollapse"
                        >
                            <span class="fw-bold">模型选择</span>
                            <span class="collapse-icon ms-1 small">▾</span>
                        </button>
                    </div>

                    <!-- collapsible body -->
                    <div id="modelCollapse" class="sidebar-body collapse show">
                        <input type="hidden" id="modelSelect" name="model_select" value="">
                        <div class="form-group mb-3">
                            <label for="modeAgent" class="form-label d-flex align-items-center gap-2" style="cursor:pointer;">
                                <input type="radio" name="selection_mode" id="modeAgent" value="agent" checked>
                                <span>选择智能体</span>
                            </label>
                            <select id="agentSelect" class="form-control">

                                    <option value="{{ value }}">{{ label }}</option>

                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group mb-3">
                            <label for="modeSingleModel" class="form-label d-flex align-items-center gap-2" style="cursor:pointer;">
                                <input type="radio" name="selection_mode" id="modeSingleModel" value="model">
                                <span>选择单模型</span>
                            </label>
                            <select id="singleModelSelect" class="form-control">
                                {% for value, label in model_options %}
                                    <option value="{{ value }}">{{ label }}</option>
                                {% empty %}
                                    <option value="">暂无可用单模型</option>
                                {% endfor %}
                            </select>
                        </div>

                            <input class="form-check-input" type="checkbox" value="1" id="showThinkingToggle" checked>
                            <label class="form-check-label small" for="showThinkingToggle">显示思考过程（渐进输出）</label>
                        </div>
                        <div class="text-muted small mb-2">（预留扩展区域）</div>
                        <a href="{% url 'setup' %}" class="btn btn-outline-secondary btn-sm w-100">系统管理</a>
                    </div>
                </div>
            </aside>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="{% static 'promotions/js/bootstrap.min.js' %}"></script>
<script>
  // --- Link / Markdown helpers ---
  const md = window.markdownit({
    html: false,
    linkify: true,
    breaks: true,
  });

  function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function textToSafeHtml(s){ return escapeHtml(s).replace(/\n/g,'<br>'); }

  function normalizeMediaUrl(url){
    if (!url) return url;
    const trimmed = url.trim();
    if (/^https?:\/\//i.test(trimmed)) return trimmed;
    if (trimmed.startsWith('/')) return trimmed;
    if (trimmed.startsWith('static/')) return '/' + trimmed;
    return trimmed;
  }

  function getMediaType(url){
    const clean = (url || '').toLowerCase();
    if (clean.endsWith('.mp4')) return 'video';
    if (/(\.png|\.jpg|\.jpeg|\.gif|\.webp)$/.test(clean)) return 'image';
    if (clean.endsWith('.pdf')) return 'pdf';
    return null;
  }

  function renderMarkdownSafe(text){
    let rendered = md.render(text || '');
    rendered = rendered.replace(/href="static\//g, 'href="/static/');
    rendered = rendered.replace(/src="static\//g, 'src="/static/');
    return DOMPurify.sanitize(rendered);
  }

  function findEmbeddedMedia(text){
    const items = [];
    const seen = new Set();
    const source = text || '';
    const markdownLinkRe = /\[([^\]]*)\]\(([^)\s]+)\)/ig;
    const rawMediaRe = /(?<![\(\w\/-])((?:https?:\/\/|\/?static\/)[^\s"'<>]+?\.(?:mp4|png|jpg|jpeg|gif|webp|pdf))\b/ig;

    let m;
    while ((m = markdownLinkRe.exec(source)) !== null) {
      const label = (m[1] || '').trim();
      const url = normalizeMediaUrl((m[2] || '').replace(/[)\]\}\.,;]+$/,''));
      const type = getMediaType(url);
      if (!type || seen.has(url)) continue;
      items.push({ label: label || url.split('/').pop(), url, type, fromMarkdown: true });
      seen.add(url);
    }

    while ((m = rawMediaRe.exec(source)) !== null) {
      const url = normalizeMediaUrl((m[1] || '').replace(/[)\]\}\.,;]+$/,''));
      const type = getMediaType(url);
      if (!type || seen.has(url)) continue;
      items.push({ label: url.split('/').pop(), url, type, fromMarkdown: false });
      seen.add(url);
    }

    return items;
  }

  function stripEmbeddedMediaMarkdown(text, mediaItems){
    let cleaned = text || '';
    mediaItems.forEach(item => {
      const escapedUrl = item.url
        .replace(/^\//, '')
        .replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const escapedLabel = (item.label || '')
        .replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

      cleaned = cleaned.replace(
        new RegExp(`\\[${escapedLabel}\\]\\((?:\\/?${escapedUrl}|${escapedUrl})\\)`, 'g'),
        `${item.label}（见下方资料）`
      );
      cleaned = cleaned.replace(new RegExp(`(^|\\s)(\\/?${escapedUrl})`, 'g'), '$1[已嵌入资料]');
    });
    return cleaned;
  }

  function appendInlineMedia(answerEl, mediaItems){
    mediaItems.forEach(item => {
      const card = document.createElement('div');
      card.className = 'inline-media-card';

      const title = document.createElement('div');
      title.className = 'inline-media-title';
      title.textContent = item.type === 'video'
        ? `视频资料：${item.label}`
        : item.type === 'image'
          ? `图片资料：${item.label}`
          : `PDF资料：${item.label}`;
      card.appendChild(title);

      const wrap = document.createElement('div');
      wrap.className = 'inline-media-wrap';

      if (item.type === 'video') {
        const video = document.createElement('video');
        video.src = item.url;
        video.setAttribute('playsinline','');
        video.setAttribute('webkit-playsinline','');
        video.setAttribute('controls','');
        wrap.appendChild(video);
      } else if (item.type === 'image') {
        const img = document.createElement('img');
        img.src = item.url;
        img.alt = item.label;
        wrap.appendChild(img);
      } else if (item.type === 'pdf') {
        const iframe = document.createElement('iframe');
        iframe.src = item.url;
        iframe.title = item.label;
        wrap.appendChild(iframe);
      }

      card.appendChild(wrap);

      const link = document.createElement('a');
      link.className = 'inline-media-link';
      link.href = item.url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.textContent = item.type === 'pdf' ? '在新窗口打开 PDF' : '在新窗口打开资料';
      card.appendChild(link);

      answerEl.appendChild(card);
    });
  }

  function compactAnswerText(text){
    return (text || '')
      .replace(/\r\n/g, '\n')
      .replace(/\n[\t ]+/g, '\n')
      .replace(/\n\s*\n+/g, '\n')
      .trim();
  }

  function renderAnswerContent(answerEl, text){
    const compactedText = compactAnswerText(text);
    const mediaItems = findEmbeddedMedia(compactedText);
    const cleanedText = stripEmbeddedMediaMarkdown(compactedText, mediaItems);
    answerEl.innerHTML = '<strong>答复：</strong><div class="markdown-body mt-2">' + renderMarkdownSafe(cleanedText) + '</div>';
    appendInlineMedia(answerEl, mediaItems);
  }
</script>
<script>
    // Sidebar hide/show
    (function(){
        const layout = document.getElementById('appLayout');
        const tab = document.getElementById('sidebarToggleTab');
        function syncIcon(){
            const hidden = layout.classList.contains('sidebar-hidden');
            tab.querySelector('.icon').textContent = hidden ? '‹' : '›';
        }
        tab.addEventListener('click', ()=>{ layout.classList.toggle('sidebar-hidden'); syncIcon(); });
        syncIcon();
    })();

    // CSRF helper
    function getCookie(name) {
        const v = (`; ${document.cookie}`).split(`; ${name}=`);
        if (v.length === 2) return v.pop().split(';').shift();
    }
    const CSRF_TOKEN = getCookie('csrftoken');

    // Create a message bubble
    function makeBubble(role, html = '') {
        const msg = document.createElement('div');
        msg.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = html;
        msg.appendChild(bubble);
        return msg;
    }

    // Create an AI bubble with thinking + answer areas
    function makeAIBubble() {
        const msg = document.createElement('div');
        msg.className = 'message ai';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        const thinking = document.createElement('div');
        thinking.className = 'thinking';
        thinking.innerHTML = '正在思考 <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';

        const answer = document.createElement('div');
        answer.className = 'answer';
        answer.innerHTML = '<strong>答复：</strong>';

        bubble.appendChild(thinking);
        bubble.appendChild(answer);
        msg.appendChild(bubble);
        return { msg, thinking, answer };
    }

    // Safely append text (convert \n to <br>)
    function appendText(element, text) {
        const parts = text.split('\n');
        for (let i = 0; i < parts.length; i++) {
            element.append(document.createTextNode(parts[i]));
            if (i < parts.length - 1) element.append(document.createElement('br'));
        }
    }

    // Stream via fetch (POST) and parse SSE-like events
    async function streamReply(formEl) {
        const resp = await fetch("{% url 'promotion_stream' %}", {
            method: "POST",
            headers: { "X-CSRFToken": CSRF_TOKEN },
            body: new FormData(formEl)
        });
        if (!resp.ok || !resp.body) throw new Error('网络错误');

        const reader = resp.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        return {
            async *iterEvents() {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    // split on double-newline (SSE event boundary)
                    const events = buffer.split("\n\n");
                    buffer = events.pop(); // keep last partial
                    for (const e of events) {
                        // expected shape: "event: name\ndata: {...}"
                        const lines = e.split("\n");
                        if (lines.length < 2) continue;
                        const ev = lines[0].replace(/^event:\s*/,'').trim();
                        const dataRaw = lines.slice(1).join("\n").replace(/^data:\s*/,'').trim();
                        let data;
                        try { data = JSON.parse(dataRaw); } catch { continue; }
                        yield { ev, data };
                    }
                }
            }
        };
    }

    // Main submit handler (STREAMING) — separate thinking bubble + expandable option, then streaming answer
    (function(){
        const form = document.getElementById('promotion-form');
        const messages = document.getElementById('chat-messages');
        const textarea = document.getElementById('promotionText');
        // Enter = submit, Shift+Enter = newline
        textarea.addEventListener('keydown', function(e){
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                // trigger form submit
                submitBtn.click();
            }
        });
        const submitBtn = document.getElementById('submit-button');
        const ttsAudio = document.getElementById('tts-audio');
        const hiddenModelSelect = document.getElementById('modelSelect');
        const agentSelect = document.getElementById('agentSelect');
        const singleModelSelect = document.getElementById('singleModelSelect');
        const modeAgent = document.getElementById('modeAgent');
        const modeSingleModel = document.getElementById('modeSingleModel');

        function ensureDefaultSelection() {
            if (modeAgent.checked && agentSelect.options.length > 0 && !agentSelect.value) {
                agentSelect.selectedIndex = 0;
            }
            if (modeSingleModel.checked && singleModelSelect.options.length > 0 && !singleModelSelect.value) {
                singleModelSelect.selectedIndex = 0;
            }
        }

        function syncSelectionState() {
            if (modeAgent.checked) {
                agentSelect.disabled = false;
                singleModelSelect.disabled = true;
                ensureDefaultSelection();
                hiddenModelSelect.value = agentSelect.value || '';
            } else if (modeSingleModel.checked) {
                agentSelect.disabled = true;
                singleModelSelect.disabled = false;
                ensureDefaultSelection();
                hiddenModelSelect.value = singleModelSelect.value || '';
            } else {
                hiddenModelSelect.value = '';
            }
        }

        modeAgent.addEventListener('change', syncSelectionState);
        modeSingleModel.addEventListener('change', syncSelectionState);
        agentSelect.addEventListener('change', syncSelectionState);
        singleModelSelect.addEventListener('change', syncSelectionState);

        if (agentSelect.options.length > 0) {
            modeAgent.checked = true;
        } else if (singleModelSelect.options.length > 0) {
            modeSingleModel.checked = true;
        }

        syncSelectionState();

        form.addEventListener('submit', async (e)=>{
            e.preventDefault();
            const text = textarea.value.trim();
            syncSelectionState();
            if (!text) { textarea.focus(); return; }
            if (!hiddenModelSelect.value) {
                alert('请先选择智能体或单模型。');
                if (modeAgent.checked) {
                    agentSelect.focus();
                } else {
                    singleModelSelect.focus();
                }
                return;
            }

            // 1) show user bubble immediately
            const userBubble = makeBubble('user', '<strong>问题：</strong> ' + $('<div/>').text(text).html());
            messages.appendChild(userBubble);

            // 2) optionally show a separate thinking bubble (small/grey) that is expandable
            const showThinking = (document.getElementById('showThinkingToggle')?.checked !== false);
            let thinkingMsg = null;
            let answerMsgEarly = null;
            let answerBodyEarly = null;

            if (showThinking) {
                const thinkingHtml = '<div class="thinking">正在思考 <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>' +
                                     '<div class="thinking-content" style="display:block;white-space:pre-wrap;margin-top:6px;font-size:.9rem;color:#6c757d;max-height:4.5rem;overflow:hidden;">';
                thinkingMsg = makeBubble('ai', thinkingHtml + '</div>');
                // add a small expand/collapse control
                const expandBtn = document.createElement('button');
                expandBtn.type = 'button';
                expandBtn.className = 'btn btn-sm btn-link';
                expandBtn.style.padding = '0 0 0 .5rem';
                expandBtn.textContent = '展开';
                let expanded = false;

                // attach expand behavior
                expandBtn.addEventListener('click', ()=>{
                    const cont = thinkingMsg.querySelector('.thinking-content');
                    if (!cont) return;
                    expanded = !expanded;
                    if (expanded) {
                        cont.style.maxHeight = 'none';
                        cont.style.overflow = 'auto';
                        expandBtn.textContent = '收起';
                    } else {
                        cont.style.maxHeight = '4.5rem';
                        cont.style.overflow = 'hidden';
                        expandBtn.textContent = '展开';
                    }
                    cont.scrollTop = cont.scrollHeight;
                });

                // place the expand button inside the bubble (top-right)
                const thinkingBubbleDiv = thinkingMsg.querySelector('.bubble');
                thinkingBubbleDiv.style.position = 'relative';
                expandBtn.style.position = 'absolute';
                expandBtn.style.right = '8px';
                expandBtn.style.top = '6px';
                thinkingBubbleDiv.appendChild(expandBtn);

                messages.appendChild(thinkingMsg);
                messages.scrollTop = messages.scrollHeight;
            } else {
                // If thinking is disabled, create the answer bubble immediately and stream deltas into it
                answerMsgEarly = makeBubble('ai', '<div class="answer"><strong>答复：</strong><div class="markdown-body mt-2" style="white-space:pre-wrap"></div></div>');
                messages.appendChild(answerMsgEarly);
                answerBodyEarly = answerMsgEarly.querySelector('.markdown-body');
                messages.scrollTop = messages.scrollHeight;
            }

            // 3) disable UI while streaming
            submitBtn.disabled = true;
            submitBtn.textContent = '思考中...';
            submitBtn.classList.remove('btn-primary');
            submitBtn.classList.add('btn-secondary');

            // buffer for full answer
            let fullBuffer = '';

            try {
                const streamer = await streamReply(form);
                for await (const { ev, data } of streamer.iterEvents()) {
                    if (ev === 'status') {
                        // status events can be ignored
                    } else if (ev === 'thinking') {
                        const content = data.content || '';
                        if (showThinking && thinkingMsg) {
                            const cont = thinkingMsg.querySelector('.thinking-content');
                            if (cont) {
                                appendText(cont, content);
                                cont.scrollTop = cont.scrollHeight;
                            }
                        }
                        messages.scrollTop = messages.scrollHeight;
                    } else if (ev === 'delta') {
                        // append final-answer tokens to answer stream
                        const content = data.content || '';
                        fullBuffer += content;

                        if (answerBodyEarly) {
                            appendText(answerBodyEarly, content);
                            answerBodyEarly.scrollTop = answerBodyEarly.scrollHeight;
                        }

                        messages.scrollTop = messages.scrollHeight;
                    } else if (ev === 'done') {
                        // done: optional audio
                        if (data.audio_url) {
                            ttsAudio.setAttribute('src', data.audio_url);
                            const p = ttsAudio.play(); if (p) p.catch(()=>{});
                        }

                        // hide the thinking bubble (but keep it in DOM for expand if user wants)
                        const thinkingCont = thinkingMsg.querySelector('.thinking');
                        if (thinkingCont) thinkingCont.style.display = 'none';

                        // create the final answer bubble and stream the buffered content into it (simulate streaming)
                        const answerMsg = makeBubble('ai', '<div class="answer"><strong>答复：</strong><div class="markdown-body mt-2" style="white-space:pre-wrap"></div></div>');
                        messages.appendChild(answerMsg);
                        const answerBody = answerMsg.querySelector('.markdown-body');

                        // progressive replay: split buffer into reasonable chunks
                        const CHUNK_SIZE = 32; // characters per chunk for streaming effect
                        let idx = 0;
                        while (idx < fullBuffer.length) {
                            const chunk = fullBuffer.slice(idx, idx + CHUNK_SIZE);
                            appendText(answerBody, chunk);
                            idx += CHUNK_SIZE;
                            messages.scrollTop = messages.scrollHeight;
                            // small delay to create streaming feel
                            await new Promise(r => setTimeout(r, 40));
                        }

                        // final render: replace with sanitized markdown + embedded media
                        const final = fullBuffer || '';
                        renderAnswerContent(answerBody.parentElement, final);
                        messages.scrollTop = messages.scrollHeight;
                    }
                }
            } catch (err) {
                // show a simple inline error in a visible answer bubble
                const errorMsg = makeBubble('ai', '<div class="answer"><strong>答复：</strong><div class="markdown-body mt-2">（发生错误）' + escapeHtml(err.message) + '</div></div>');
                messages.appendChild(errorMsg);
            } finally {
                // 4) re-enable UI
                submitBtn.disabled = false;
                submitBtn.textContent = '提交问题';
                submitBtn.classList.remove('btn-secondary');
                submitBtn.classList.add('btn-primary');
                textarea.value = '';
                messages.scrollTop = messages.scrollHeight;
            }
        });
    })();
</script>
<script>
  // Builds the AI video bubble (same as before)
  function makeAIVideoBubble(videoSrc) {
    const msg = document.createElement('div'); msg.className = 'message ai';
    const bubble = document.createElement('div'); bubble.className = 'bubble video-bubble';
    const wrap = document.createElement('div'); wrap.className = 'video-wrapper';

    const btn = document.createElement('button'); btn.type='button'; btn.className='reply-btn'; btn.textContent='回复';
    const video = document.createElement('video');
    video.src = videoSrc;
    video.setAttribute('playsinline',''); video.setAttribute('webkit-playsinline','');
    video.setAttribute('controls',''); // visible when it becomes a chat bubble

    wrap.appendChild(btn); wrap.appendChild(video);
    bubble.appendChild(wrap); msg.appendChild(bubble);

    btn.addEventListener('click', () => {
      const ta = document.getElementById('promotionText'); ta.focus();
      if (!ta.value.trim()) { ta.value = '关于入院介绍视频的提问：'; ta.selectionStart = ta.selectionEnd = ta.value.length; }
    });

    return { msg, video, btn };
  }

  // async function enterFullscreenIfPossible(el) {

  //   if (el.webkitEnterFullscreen) { el.webkitEnterFullscreen(); return true; } // iOS Safari
  //   return false;

  // async function playIntroFullscreen(videoEl) {

  //   videoEl.muted = true;         // autoplay requirement
  //   await videoEl.play();         // start playback
  //   try { await enterFullscreenIfPossible(videoEl); } catch(e) { /* ignore */ }
  //   // Optionally unmute after entering FS (may still require user gesture on some devices)
  //   setTimeout(() => { try { videoEl.muted = false; } catch{} }, 300);

  (function setupIntroVideo() {
    const layout = document.getElementById('appLayout');
    if (!layout) return;

    const showIntro = layout.getAttribute('data-show-intro') === '1';
    const videoSrc  = layout.getAttribute('data-intro-src');
    if (!showIntro || !videoSrc) return;

    const messages = document.getElementById('chat-messages');
    const gate = document.getElementById('introGate');
    const startBtn = document.getElementById('introStart');

    // Build bubble first so the same element remains after FS
    const intro = makeAIVideoBubble(videoSrc);
    if (messages.firstChild) messages.insertBefore(intro.msg, messages.firstChild);
    else messages.appendChild(intro.msg);
    // NEW: append a short welcome/introduction area under the video
    const welcomeText = layout.getAttribute('data-intro-welcome') || '';
    if (welcomeText) {
      const welcome = document.createElement('div');
      welcome.className = 'intro-welcome';
      // Use safe text rendering; supports \n if you include it
      welcome.innerHTML = textToSafeHtml(welcomeText);
      intro.msg.querySelector('.bubble')?.appendChild(welcome);
    }
    // Show one-tap gate (required for fullscreen policy)
    gate.hidden = false;

    // On tap: play + fullscreen
    startBtn.addEventListener('click', async () => {
      gate.hidden = true;
      try { await playIntroFullscreen(intro.video); }
      catch (e) { /* if anything fails, the video still plays inline */ }

      // When user exits FS, keep bubble inline (already in DOM)
      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
          try { intro.video.controls = true; } catch {}
        }
      }, { once: true });
    }, { once: true });
  })();
</script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.js-rendered-answer').forEach(function (el) {
            renderAnswerContent(el, el.dataset.markdown || '');
        });

        var collapseEl = document.getElementById('modelCollapse');
        if (!collapseEl || typeof bootstrap === 'undefined') return;

        // Create Collapse instance but don't toggle automatically
        var modelCollapse = new bootstrap.Collapse(collapseEl, { toggle: false });

        // Default state: collapsed on mobile (<768px), expanded on larger screens
        function setInitialCollapseState() {
            if (window.matchMedia('(max-width: 767.98px)').matches) {
                modelCollapse.hide();
            } else {
                modelCollapse.show();
            }
        }
        setInitialCollapseState();

        // Update arrow icon
        var toggleBtn = document.querySelector('.sidebar-collapse-toggle');
        var icon = toggleBtn ? toggleBtn.querySelector('.collapse-icon') : null;

        collapseEl.addEventListener('shown.bs.collapse', function () {
            if (icon) icon.textContent = '▾';
        });
        collapseEl.addEventListener('hidden.bs.collapse', function () {
            if (icon) icon.textContent = '▸';
        });

        window.addEventListener('resize', function () {
            setInitialCollapseState();
        });
    });
</script>
