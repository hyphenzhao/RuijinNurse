<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>瑞金医院功能神外宣讲AI</title>
    <!-- Bootstrap CSS -->
    <link href="{% static 'promotions/css/bootstrap.min.css' %}" rel="stylesheet">
    <script src="{% static 'promotions/js/jquery-3.5.1.min.js' %}"></script>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1 class="text-center my-4" style="background-color: blue; color: white; padding: 10px;">瑞金医院功能神外宣讲AI</h1>
                <div class="video-container text-center mb-4">
                    <video controls class="img-fluid" autoplay loop muted>
                        <source src="{% static 'promotions/video1.mp4' %}" type="video/mp4">
                        浏览器不支持视频播放。
                    </video>
                </div>
                <form id="promotion-form" class="bg-light p-4 rounded shadow-sm">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="promotionText">您的问题</label>
                        <textarea id="promotionText" name="promotion_text" class="form-control" rows="5" placeholder="在此输入您的问题"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="modelSelect">选择模型</label>
                        <select id="modelSelect" name="model_select" class="form-control">
                            <option value="l-deepseek">本地-深度求索</option>
                            <option value="l-gemma">本地-Gemma</option>
                            <option value="r-kimi">云端-Kimi</option>
                            <option value="r-baidu">云端-文心一言</option>
                            <option value="l-ziya">本地-姜子牙</option>
                            <option value="l-other">本地-其他</option>
                        </select>
                    </div>
                    <button type="submit" id="submit-button" class="btn btn-primary btn-block">提交问题</button>
                </form>
                
                <!-- Audio element to play the TTS sound -->
                <audio id="tts-audio" src="" autoplay hidden></audio>

                <div id="chat-box" class="mt-4">
                    <!-- Existing chat history rendered from server-side -->
                    {% for chat in chat_history %}
                    <div class="card mt-2">
                        <div class="card-body">
                            <strong>问题：</strong> {{ chat.user }}<br>
                            <strong>答复：</strong> {{ chat.response }}
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="{% static 'promotions/js/bootstrap.min.js' %}"></script>

    <script>
        $(document).ready(function() {
            $('#promotion-form').on('submit', function(event) {
                event.preventDefault();
                var submitButton = $('#submit-button');
                submitButton.prop('disabled', true); // Disable the button
                submitButton.text('思考中...'); // Change the text
                submitButton.removeClass('btn-primary').addClass('btn-secondary'); // Change color to grey

                $.ajax({
                    url: "{% url 'promotion' %}",
                    type: "POST",
                    data: $(this).serialize(),
                    success: function(response) {
                        $('#promotionText').val(''); // Clear the text area after submission
                        $('#chat-box').empty(); // Clear the chat box before updating
                        response.chat_history.forEach(function(chat) {
                            $('#chat-box').append(
                                '<div class="card mt-2">' +
                                '<div class="card-body">' +
                                '<strong>问题：</strong> ' + chat.user + '<br>' +
                                '<strong>答复：</strong> ' + chat.response +
                                '</div>' +
                                '</div>'
                            );
                        });

                        // Set the audio source and play it
                        if (response.audio_url) {
                            $('#tts-audio').attr('src', response.audio_url);
                            $('#tts-audio')[0].play();
                        }
                    },
                    error: function(response) {
                        alert('An error occurred. Please try again.');
                    },
                    complete: function() {
                        submitButton.prop('disabled', false); // Re-enable the button
                        submitButton.text('提交问题'); // Restore the original text
                        submitButton.removeClass('btn-secondary').addClass('btn-primary'); // Restore the original color
                    }
                });
            });
        });
    </script>
</body>
</html>
