<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>角色设定与背景知识编辑</title>
    <style>
        /* Container to hold two columns side by side */
        .container {
            display: flex;
            justify-content: space-between;
            margin: 20px;
        }
        /* Each column styling */
        .column {
            flex: 0 0 48%;
            border: 1px solid #ccc;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        /* Textarea style */
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }
        /* Button container */
        .button-group {
            margin-top: 10px;
            text-align: center;
        }
        .button-group button {
            margin: 5px;
            padding: 5px 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1 style="text-align:center;">角色设定与背景知识</h1>
    <!-- The form posts back to the same URL handled by setup_view -->
    <form method="POST">
        {% csrf_token %}
        <div class="container">
            <!-- Column for 角色设定 -->
            <div class="column">
                <h2>角色设定</h2>
                <textarea name="role_text">{{ role_text }}</textarea>
                <div class="button-group">
                    <!-- The buttons include a name and value so the view can detect which action was requested -->
                    <button type="submit" name="action" value="load_role">加载角色</button>
                    <button type="submit" name="action" value="save_role">保存角色</button>
                </div>
            </div>
            <!-- Column for 背景知识 -->
            <div class="column">
                <h2>背景知识</h2>
                <textarea name="knowledge_text">{{ knowledge_text }}</textarea>
                <div class="button-group">
                    <button type="submit" name="action" value="load_knowledge">加载背景</button>
                    <button type="submit" name="action" value="save_knowledge">保存背景</button>
                </div>
            </div>
        </div>
    </form>
</body>
</html>
