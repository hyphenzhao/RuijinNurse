<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>瑞金医院功能神外宣讲AI</title>

    <!-- Bootstrap CSS -->
    <link href="{% static 'promotions/css/bootstrap.min.css' %}" rel="stylesheet" />
    <script src="{% static 'promotions/js/jquery-3.5.1.min.js' %}"></script>

    <style>
        /* --- Layout & sizing --- */
        .app-header{background-color:#0d6efd;color:#fff;padding:10px;border-radius:.5rem;}
        .app-layout{display:flex;gap:1rem;align-items:stretch;position:relative;}
        .panel-left,.panel-center,.panel-right{display:flex;flex-direction:column;min-width:0;}
        .panel-left{flex:0 0 28%;}
        .panel-center{flex:1 1 auto;position:relative;transition:flex-basis .35s ease,max-width .35s ease;}
        .panel-right{flex:0 0 24%;transition:flex-basis .35s ease,max-width .35s ease,opacity .35s ease,transform .35s ease;}

        /* Hide/Show behavior */
        .sidebar-hidden .panel-right{
            max-width:0!important;flex-basis:0!important;opacity:0;overflow:hidden;transform:translateX(8px);pointer-events:none;
        }
        /* center auto-expands when right is 0 */

        /* --- Left video --- */
        .video-card{position:sticky;top:1rem;}
        .video-card video{width:100%;height:auto;border-radius:.5rem;}

        /* --- Chat surface --- */
        .chat-surface{background:#fff;border-radius:.5rem;box-shadow:0 0.125rem 0.25rem rgba(0,0,0,.075);display:flex;flex-direction:column;min-height:60vh;}
        .chat-messages{padding:1rem;overflow-y:auto;flex:1 1 auto;scroll-behavior:smooth;border-bottom:1px solid rgba(0,0,0,.075);}
        .message{display:flex;margin-bottom:.5rem;}
        .message.user{justify-content:flex-end;}
        .message.ai{justify-content:flex-start;}
        .bubble{max-width:78%;padding:.5rem .75rem;border-radius:1rem;box-shadow:0 1px 2px rgba(0,0,0,.05);word-wrap:break-word;white-space:pre-wrap;line-height:1.4;}
        .message.user .bubble{background:#dceeff;border-top-right-radius:.25rem;}
        .message.ai .bubble{background:#f1f3f5;border-top-left-radius:.25rem;}
        .chat-input{padding:.75rem;display:flex;gap:.5rem;align-items:center;}
        .chat-input textarea{resize:vertical;min-height:90px;max-height:200px;}

        /* --- Right sidebar --- */
        .sidebar{background:#fff;border-radius:.5rem;box-shadow:0 0.125rem 0.25rem rgba(0,0,0,.075);overflow:hidden;}
        .sidebar-header{padding:.75rem 1rem;border-bottom:1px solid rgba(0,0,0,.075);display:flex;align-items:center;justify-content:space-between;}
        .sidebar-body{padding:1rem;}

        /* --- Persistent toggle tab --- */
        .sidebar-toggle-tab{
            position:absolute;top:50%;right:-0.75rem;transform:translateY(-50%);
            z-index:20;border:1px solid rgba(0,0,0,.1);background:#fff;border-radius:1rem;
            width:36px;height:72px;display:flex;align-items:center;justify-content:center;
            box-shadow:0 6px 16px rgba(0,0,0,.12);cursor:pointer;user-select:none;
        }
        .sidebar-toggle-tab .icon{font-size:1.25rem;line-height:1;}
        .sidebar-toggle-tab:hover{box-shadow:0 8px 20px rgba(0,0,0,.16);}

        /* Mobile: stack & float the toggle */
        @media (max-width: 991.98px){
            .app-layout{flex-direction:column;}
            .panel-left,.panel-center,.panel-right{flex-basis:auto!important;max-width:100%!important;}
            .video-card{position:static;}
            .sidebar-toggle-tab{
                position:fixed;right:1rem;bottom:1rem;top:auto;transform:none;height:44px;width:44px;border-radius:50%;
            }
        }
    </style>
</head>
<body>
<div class="container my-4">
    <h1 class="text-center my-2 app-header">瑞金医院功能神外宣讲AI</h1>

    <div id="appLayout" class="app-layout mt-3">
        <!-- Left: Welcome Video -->
        <div class="panel-left">
            <div class="video-card card">
                <div class="card-body">
                    <div class="mb-2 fw-bold">欢迎视频</div>
                    <video controls autoplay loop muted playsinline>
                        <source src="{% static 'promotions/video1.mp4' %}" type="video/mp4" />
                        浏览器不支持视频播放。
                    </video>
                </div>
            </div>
        </div>

        <!-- Center: Chat (form wraps input so model selection also submits) -->
        <form id="promotion-form" class="panel-center" method="post">
            {% csrf_token %}
            <div class="chat-surface">
                <div id="chat-messages" class="chat-messages">
                    {% for chat in chat_history %}
                        <div class="message user"><div class="bubble"><strong>问题：</strong> {{ chat.user }}</div></div>
                        <div class="message ai"><div class="bubble"><strong>答复：</strong> {{ chat.response }}</div></div>
                    {% endfor %}
                </div>
                <div class="chat-input">
                    <textarea id="promotionText" name="promotion_text" class="form-control" placeholder="在此输入您的问题"></textarea>
                    <button type="submit" id="submit-button" class="btn btn-primary">提交问题</button>
                </div>
            </div>

            <!-- TTS -->
            <audio id="tts-audio" src="" autoplay hidden></audio>

            <!-- Persistent hide/show tab (lives on the center panel, so it remains visible) -->
            <button type="button" id="sidebarToggleTab" class="sidebar-toggle-tab" aria-controls="sidebar" aria-pressed="true" title="隐藏/显示模型选择">
                <span class="icon" aria-hidden="true">›</span>
            </button>

            <!-- Right: Sidebar -->
            <aside id="sidebar" class="panel-right">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <div class="fw-bold">模型选择</div>
                    </div>
                    <div class="sidebar-body">
                        <div class="form-group mb-3">
                            <label for="modelSelect" class="form-label">选择模型</label>
                            <select id="modelSelect" name="model_select" class="form-control">
                                <option value="l-deepseek">本地-深度求索</option>
                                <option value="l-gemma">本地-Gemma</option>
                                <option value="l-other">本地-其他</option>
                            </select>
                        </div>
                        <div class="text-muted small">（预留扩展区域）</div>
                    </div>
                </div>
            </aside>
        </form>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="{% static 'promotions/js/bootstrap.min.js' %}"></script>

<script>
    // --- Hide/Show sidebar with persistent tab ---
    (function(){
        const $layout = $('#appLayout');
        const $tab = $('#sidebarToggleTab');
        function syncIcon(){
            const hidden = $layout.hasClass('sidebar-hidden');
            // When hidden, show "‹" (pull back); when visible, show "›" (push away)
            $tab.find('.icon').text(hidden ? '‹' : '›');
            $tab.attr('aria-pressed', String(!hidden));
        }
        $tab.on('click', function(){
            $layout.toggleClass('sidebar-hidden');
            syncIcon();
        });
        syncIcon();
    })();

    // --- Chat helpers (bubble rendering + ajax) ---
    function appendBubble(role, htmlText){
        const $msg = $('<div/>',{class:'message '+role});
        const $bubble = $('<div/>',{class:'bubble'}).html(htmlText);
        $msg.append($bubble);
        $('#chat-messages').append($msg);
    }
    function renderChatHistory(history){
        const $box = $('#chat-messages');
        $box.empty();
        history.forEach(function(chat){
            appendBubble('user','<strong>问题：</strong> '+chat.user);
            appendBubble('ai','<strong>答复：</strong> '+chat.response);
        });
        $box.scrollTop($box[0].scrollHeight);
    }

    $(function(){
        const $submit = $('#submit-button');
        const $text = $('#promotionText');
        const $chat = $('#chat-messages');

        $chat.scrollTop($chat[0].scrollHeight);

        $('#promotion-form').on('submit', function(e){
            e.preventDefault();
            if(!$text.val().trim()){ $text.focus(); return; }

            $submit.prop('disabled', true).text('思考中...').removeClass('btn-primary').addClass('btn-secondary');

            $.ajax({
                url: "{% url 'promotion' %}",
                type: "POST",
                data: $(this).serialize(),
                success: function(response){
                    $text.val('');
                    if(response && response.chat_history){ renderChatHistory(response.chat_history); }
                    if(response && response.audio_url){
                        const audio = $('#tts-audio')[0];
                        $('#tts-audio').attr('src', response.audio_url);
                        const p = audio.play(); if(p!==undefined){ p.catch(()=>{}); }
                    }
                },
                error: function(){ alert('发生错误，请重试。'); },
                complete: function(){
                    $submit.prop('disabled', false).text('提交问题').removeClass('btn-secondary').addClass('btn-primary');
                    $chat.scrollTop($chat[0].scrollHeight);
                }
            });
        });
    });
</script>
</body>
</html>
